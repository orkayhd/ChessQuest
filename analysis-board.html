<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessQuest • Analysebrett</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            grid-template-rows: repeat(8, 72px);
            border: 6px solid #2a2a2a;
            background: #1f1f1f;
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .piece {
            width: 62px;
            height: 62px;
            background-size: contain;
            background-repeat: no-repeat;
        }
        
        .highlight::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.6) 50%, transparent);
            border-radius: 50%;
        }
        .highlight.capture::after {
            width: 64px;
            height: 64px;
            border: 5px solid rgba(248, 113, 113, 0.7);
            background: transparent;
        }
        
        svg#arrows {
            position: absolute;
            top: 0; left: 0;
            width: 576px;
            height: 576px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- EINHEITLICHE NAVBAR -->
    <nav class="bg-black/80 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">♟️</div>
                <span class="text-3xl font-bold logo-font tracking-tighter">ChessQuest</span>
            </div>

            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-house"></i> Home</a>
                <a href="campaign.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-map"></i> Kampagne</a>
                <a href="ai-opponents.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-robot"></i> KI-Gegner</a>
                <a href="analysis-board.html" class="text-cyan-400 font-semibold flex items-center gap-2"><i class="fa-solid fa-chart-simple"></i> Analysebrett</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="px-4 py-2 text-sm border border-white/30 rounded-2xl" id="lang-btn">🇩🇪 Deutsch</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-5xl font-bold logo-font tracking-tighter">Analysebrett</h1>
                <p class="text-zinc-400 text-lg">Analysiere deine Partien mit starker Stockfish-Engine</p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- BOARD -->
            <div class="flex-1">
                <div id="board-container" class="relative inline-block">
                    <div class="board" id="board"></div>
                    <svg id="arrows" width="576" height="576" viewBox="0 0 576 576"></svg>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div class="w-full lg:w-96 space-y-6">
                <!-- Engine -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        <span class="text-emerald-400">♟</span> Stockfish 16 Analyse
                    </h3>
                    <div class="flex gap-6">
                        <div class="w-10 h-60 bg-zinc-800 rounded-2xl overflow-hidden relative">
                            <div id="eval-bar" class="absolute bottom-0 w-full bg-emerald-500 transition-all"></div>
                        </div>
                        <div class="flex-1">
                            <div id="eval-score" class="text-5xl font-bold">0.00</div>
                            <div id="best-move" class="mt-4 bg-zinc-800 p-4 rounded-2xl text-sm">Bester Zug: —</div>
                        </div>
                    </div>
                    <button onclick="startAnalysis()" 
                            class="mt-6 w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">
                        Analyse starten
                    </button>
                </div>

                <!-- Moves -->
                <div class="glass rounded-3xl p-6">
                    <h4 class="font-medium mb-4">Zugliste</h4>
                    <div id="moves" class="bg-zinc-900 rounded-2xl p-5 h-64 overflow-y-auto text-sm"></div>
                </div>

                <!-- Explorer -->
                <div class="glass rounded-3xl p-6">
                    <h4 class="font-medium mb-4">📖 Opening Explorer</h4>
                    <div id="explorer" class="bg-zinc-900 rounded-2xl p-5 h-52 overflow-y-auto text-sm"></div>
                </div>

                <!-- Controls -->
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="undoMove()" class="glass py-4 rounded-2xl hover:bg-white/10">↩ Rückgängig</button>
                    <button onclick="flipBoard()" class="glass py-4 rounded-2xl hover:bg-white/10">🔄 Drehen</button>
                    <button onclick="resetBoard()" class="glass py-4 rounded-2xl hover:bg-white/10">Reset</button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="copyPGN()" class="glass py-4 rounded-2xl hover:bg-white/10">PGN kopieren</button>
                    <button onclick="exportFEN()" class="glass py-4 rounded-2xl hover:bg-white/10">FEN kopieren</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black py-12 border-t border-white/10 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center text-zinc-500 text-sm">
            © 2026 ChessQuest • Professionelle Schachplattform
        </div>
    </footer>

    <script>
        let chess = new Chess();
        let pgnMoves = [];
        let isFlipped = false;
        let selectedSquare = null;
        let stockfish = null;

        const chessPieces = {
            wp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
            wr: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
            wn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
            wb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
            wq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
            wk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
            bp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
            br: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
            bn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
            bb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
            bq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
            bk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
        };

        const boardEl = document.getElementById("board");
        const svgArrows = document.getElementById("arrows");
        const movesDiv = document.getElementById("moves");
        const explorerDiv = document.getElementById("explorer");

        // Stockfish initialisieren
        function initStockfish() {
            stockfish = STOCKFISH();
            stockfish.onmessage = (event) => {
                const line = event.data;
                if (line.includes("info depth") && line.includes("pv")) {
                    processStockfishOutput(line);
                }
            };
        }

        function processStockfishOutput(line) {
            const scoreMatch = line.match(/score cp (-?\d+)/);
            const pvMatch = line.match(/pv ([a-h][1-8][a-h][1-8])/);

            if (scoreMatch) {
                let score = parseInt(scoreMatch[1]) / 100;
                document.getElementById("eval-score").textContent = score >= 0 ? "+" + score.toFixed(2) : score.toFixed(2);
                document.getElementById("eval-bar").style.height = Math.max(5, Math.min(95, 50 + score * 8)) + "%";
            }

            if (pvMatch) {
                const uci = pvMatch[1];
                drawArrow(uci);
            }
        }

        function drawArrow(uci) {
            svgArrows.innerHTML = "";
            const from = uci.substring(0,2);
            const to = uci.substring(2,4);

            const size = 72;
            let fromX = (from.charCodeAt(0) - 97) * size + 36;
            let fromY = (8 - parseInt(from[1])) * size + 36;
            let toX = (to.charCodeAt(0) - 97) * size + 36;
            let toY = (8 - parseInt(to[1])) * size + 36;

            if (isFlipped) {
                fromX = 576 - fromX; fromY = 576 - fromY;
                toX = 576 - toX; toY = 576 - toY;
            }

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", fromX);
            line.setAttribute("y1", fromY);
            line.setAttribute("x2", toX);
            line.setAttribute("y2", toY);
            line.setAttribute("stroke", "#4ade80");
            line.setAttribute("stroke-width", "7");
            line.setAttribute("marker-end", "url(#arrowhead)");
            svgArrows.appendChild(line);
        }

        function startAnalysis() {
            if (!stockfish) initStockfish();
            const fen = chess.fen();
            stockfish.postMessage("position fen " + fen);
            stockfish.postMessage("go depth 16");
        }

        // Board Rendering
        function renderBoard(highlight = []) {
            boardEl.innerHTML = "";
            const start = isFlipped ? 7 : 0;
            const step = isFlipped ? -1 : 1;

            for (let r = start; r !== (isFlipped ? -1 : 8); r += step) {
                for (let c = 0; c < 8; c++) {
                    const squareName = String.fromCharCode(97 + c) + (8 - r);
                    const square = document.createElement("div");
                    square.className = `square ${(r + c) % 2 === 0 ? "light" : "dark"}`;
                    square.dataset.square = squareName;

                    const piece = chess.get(squareName);
                    if (piece) {
                        const p = document.createElement("div");
                        p.className = "piece";
                        p.style.backgroundImage = `url('${chessPieces[piece.color + piece.type]}')`;
                        square.appendChild(p);
                    }

                    if (highlight.includes(squareName)) {
                        square.classList.add(chess.get(squareName) ? "highlight capture" : "highlight");
                    }

                    square.addEventListener("click", () => handleClick(squareName));
                    boardEl.appendChild(square);
                }
            }
        }

        let selectedSquare = null;

        function handleClick(square) {
            if (selectedSquare) {
                const move = chess.move({from: selectedSquare, to: square, promotion: 'q'});
                if (move) {
                    pgnMoves.push(move.san);
                    renderMoves();
                    renderBoard();
                    startAnalysis();
                    selectedSquare = null;
                    return;
                }
                selectedSquare = null;
            }

            if (chess.get(square) && chess.get(square).color === chess.turn()) {
                selectedSquare = square;
                const legal = chess.moves({square: square, verbose: true}).map(m => m.to);
                renderBoard(legal);
            }
        }

        function renderMoves() {
            movesDiv.innerHTML = pgnMoves.map((san, i) => `
                <div class="py-2 px-4 ${i%2===0 ? 'bg-white/5' : ''} rounded-xl">${Math.floor(i/2)+1}. ${san}</div>
            `).join('');
        }

        function undoMove() {
            if (pgnMoves.length === 0) return;
            pgnMoves.pop();
            chess = new Chess();
            pgnMoves.forEach(s => chess.move(s));
            renderBoard();
            renderMoves();
            startAnalysis();
        }

        function resetBoard() {
            chess = new Chess();
            pgnMoves = [];
            isFlipped = false;
            renderBoard();
            renderMoves();
        }

        function flipBoard() {
            isFlipped = !isFlipped;
            renderBoard();
        }

        function copyPGN() {
            navigator.clipboard.writeText(chess.pgn());
            alert("PGN kopiert!");
        }

        function exportFEN() {
            navigator.clipboard.writeText(chess.fen());
            alert("FEN kopiert!");
        }

        function toggleLanguage() {
            alert("Sprachumschaltung wird bald global verfügbar sein.");
        }

        // Init
        window.onload = function() {
            initStockfish();
            renderBoard();
            renderMoves();
            console.log("%c✅ ChessQuest Analysebrett – einheitliches Design fertig!", "color:#67e8f9; font-weight:bold");
        };
    </script>
</body>
</html>
