<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessQuest • Kampagne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
        }
        
        .chess-square {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .piece {
            width: 58px;
            height: 58px;
            background-size: contain;
            background-repeat: no-repeat;
        }
        
        .map-node { transition: all 0.4s ease; }
        .map-node:hover { transform: scale(1.25); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- EINHEITLICHE NAVBAR -->
    <nav class="bg-black/80 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">♟️</div>
                <span class="text-3xl font-bold logo-font tracking-tighter">ChessQuest</span>
            </div>

            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-house"></i> Home</a>
                <a href="campaign.html" class="text-cyan-400 font-semibold flex items-center gap-2"><i class="fa-solid fa-map"></i> Kampagne</a>
                <a href="ai-opponents.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-robot"></i> KI-Gegner</a>
                <a href="analysis-board.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-chart-simple"></i> Analysebrett</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="px-4 py-2 text-sm border border-white/30 rounded-2xl" id="lang-btn">🇩🇪 Deutsch</button>
                <div onclick="showCharacterModal()" class="flex items-center gap-3 cursor-pointer">
                    <div id="nav-avatar" class="w-9 h-9 rounded-2xl bg-gradient-to-br from-purple-500 to-cyan-400 flex items-center justify-center text-2xl"></div>
                    <div>
                        <p id="nav-name" class="font-semibold text-sm"></p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-6xl font-bold logo-font tracking-tighter mb-4">Die Weltkampagne</h1>
        <p class="text-zinc-400 text-xl">Reise über die Kontinente und besiege die Meister jedes Landes</p>

        <!-- ECHTE WELTKARTE -->
        <div class="glass rounded-3xl p-10 mt-10">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-globe"></i> Die Welt von ChessQuest
            </h2>
            
            <svg id="world-map" width="100%" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
                <!-- Vereinfachte realistische Kontinente -->
                <path d="M380 180 Q480 140 550 170" fill="#334155" stroke="#64748b" stroke-width="25"/> <!-- Europa -->
                <path d="M620 140 Q850 80 980 180" fill="#334155" stroke="#64748b" stroke-width="35"/> <!-- Asien -->
                <path d="M480 280 Q550 420 670 380" fill="#334155" stroke="#64748b" stroke-width="30"/> <!-- Afrika -->
                <path d="M150 120 Q250 80 320 180" fill="#334155" stroke="#64748b" stroke-width="28"/> <!-- Nordamerika -->
                <path d="M220 320 Q280 450 340 420" fill="#334155" stroke="#64748b" stroke-width="22"/> <!-- Südamerika -->
                <path d="M980 380 Q1080 410 1050 450" fill="#334155" stroke="#64748b" stroke-width="18"/> <!-- Australien -->
                
                <g id="map-nodes"></g>
            </svg>
        </div>

        <!-- STORY BOX -->
        <div id="story-box" class="glass rounded-3xl p-8 mt-8 hidden">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div id="opponent-avatar" class="text-8xl w-32 h-32 flex items-center justify-center bg-zinc-800 rounded-3xl"></div>
                <div class="flex-1">
                    <h3 id="opponent-name" class="text-4xl font-bold"></h3>
                    <p id="opponent-continent" class="text-cyan-400 text-xl mt-1"></p>
                    <p id="opponent-story" class="mt-6 text-zinc-300 leading-relaxed"></p>
                    
                    <button onclick="startCampaignGame()" 
                            class="mt-8 px-10 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold flex items-center gap-3">
                        <i class="fa-solid fa-chess-knight"></i> Jetzt herausfordern
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black py-12 border-t border-white/10 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center text-zinc-500 text-sm">
            © 2026 ChessQuest • Professionelle Schachplattform
        </div>
    </footer>

    <!-- CHARACTER MODAL -->
    <div id="character-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 max-w-md w-full">
            <h2 class="text-4xl font-bold text-center mb-10">Wähle deinen Helden</h2>
            <div class="grid grid-cols-2 gap-10">
                <div onclick="selectCharacter(0)" class="cursor-pointer text-center group">
                    <div class="text-9xl mb-4 transition group-hover:scale-110">🧔</div>
                    <p class="font-semibold text-2xl">Aetherion</p>
                </div>
                <div onclick="selectCharacter(1)" class="cursor-pointer text-center group">
                    <div class="text-9xl mb-4 transition group-hover:scale-110">👩</div>
                    <p class="font-semibold text-2xl">Lunara</p>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME MODAL -->
    <div id="game-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[60] p-4">
        <div class="w-full max-w-6xl bg-zinc-900 rounded-3xl overflow-hidden">
            <div class="px-8 py-5 border-b border-white/10 flex justify-between">
                <div class="flex items-center gap-5">
                    <span id="opponent-avatar-game" class="text-5xl"></span>
                    <div>
                        <p id="opponent-name-game" class="font-bold text-xl"></p>
                        <p id="opponent-elo-game" class="text-zinc-400"></p>
                    </div>
                </div>
                <button onclick="closeGameModal()" class="text-4xl text-white/60 hover:text-white">✕</button>
            </div>
            
            <div class="flex flex-col lg:flex-row">
                <div class="flex-1 p-8 flex justify-center bg-zinc-950">
                    <div id="chessboard" class="grid grid-cols-8 w-full max-w-[560px] aspect-square rounded-xl overflow-hidden shadow-2xl"></div>
                </div>
                <div class="lg:w-96 bg-zinc-950 p-6 flex flex-col">
                    <div id="move-list" class="flex-1 overflow-y-auto text-sm"></div>
                    <button onclick="resignGame()" class="mt-6 py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Aufgeben</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GLOBALE VARIABLEN ====================
        let currentCharacter = null;
        let currentOpponent = null;
        let chess = new Chess();
        let moveHistory = [];
        let campaignProgress = parseInt(localStorage.getItem('campaign_progress')) || 0;

        const chessPieces = {
            wp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
            wr: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
            wn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
            wb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
            wq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
            wk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
            bp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
            br: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
            bn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
            bb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
            bq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
            bk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
        };

        const opponents = [
            {id:1, name:"Elias der Anfänger", continent:"Europa (Deutschland)", elo:500, emoji:"🇩🇪", story:"Ein junger Schachspieler aus München. Er lernt noch die Grundlagen."},
            {id:2, name:"Anya die Froststrategin", continent:"Russland", elo:850, emoji:"❄️", story:"Eine kalte und präzise Spielerin aus Sibirien."},
            {id:3, name:"Khalid der Wüstenfuchs", continent:"Afrika (Marokko)", elo:1200, emoji:"🦊", story:"Ein nomadischer Meister aus der Sahara."},
            {id:4, name:"Mei Lin die Seidenmeisterin", continent:"Asien (China)", elo:1550, emoji:"🐉", story:"Elegante Eröffnungen aus Shanghai."},
            {id:5, name:"Rajesh der Tempelwächter", continent:"Indien", elo:1800, emoji:"🛕", story:"Ein weiser Schachphilosoph aus Varanasi."},
            {id:6, name:"Void Sovereign", continent:"Die Letzte Prüfung", elo:2000, emoji:"🌌", story:"Der mysteriöse Endgegner."}
        ];

        // ==================== CHARACTER SELECTION ====================
        function showCharacterModal() {
            document.getElementById('character-modal').classList.remove('hidden');
        }

        function selectCharacter(gender) {
            currentCharacter = gender === 0 ? 
                {name: "Aetherion", avatar: "🧔"} : 
                {name: "Lunara", avatar: "👩"};
            
            document.getElementById('nav-avatar').innerHTML = currentCharacter.avatar;
            document.getElementById('nav-name').textContent = currentCharacter.name;
            document.getElementById('character-modal').classList.add('hidden');
            renderCampaignMap();
        }

        // ==================== WELTKARTE ====================
        function renderCampaignMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = '';

            opponents.forEach((opp, i) => {
                const unlocked = i <= campaignProgress;
                const x = 140 + i * 165;
                const y = (i % 2 === 0) ? 170 : 340;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.classList.add('map-node');

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "42");
                circle.setAttribute("fill", unlocked ? "#22d3ee" : "#1e2937");
                circle.setAttribute("stroke", "#fff");
                circle.setAttribute("stroke-width", unlocked ? "6" : "3");

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", y + 13);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("font-size", "32");
                text.textContent = opp.emoji;

                g.appendChild(circle);
                g.appendChild(text);

                if (unlocked) g.addEventListener('click', () => showOpponentStory(opp));

                container.appendChild(g);
            });
        }

        function showOpponentStory(opp) {
            currentOpponent = opp;
            document.getElementById('opponent-avatar').innerHTML = opp.emoji;
            document.getElementById('opponent-name').textContent = opp.name;
            document.getElementById('opponent-continent').textContent = opp.continent;
            document.getElementById('opponent-story').textContent = opp.story;
            document.getElementById('story-box').classList.remove('hidden');
        }

        function startCampaignGame() {
            document.getElementById('story-box').classList.add('hidden');
            chess = new Chess();
            moveHistory = [];

            const modal = document.getElementById('game-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('opponent-avatar-game').innerHTML = currentOpponent.emoji;
            document.getElementById('opponent-name-game').textContent = currentOpponent.name;
            document.getElementById('opponent-elo-game').textContent = `ELO ${currentOpponent.elo}`;

            renderChessBoard();
        }

        // ==================== CHESS BOARD (Chess.com Style) ====================
        function renderChessBoard() {
            const board = document.getElementById('chessboard');
            board.innerHTML = '';

            for (let rank = 8; rank >= 1; rank--) {
                for (let file = 0; file < 8; file++) {
                    const squareName = String.fromCharCode(97 + file) + rank;
                    const piece = chess.get(squareName);
                    const isLight = (rank + file) % 2 === 1;

                    const squareDiv = document.createElement('div');
                    squareDiv.className = `chess-square ${isLight ? 'light' : 'dark'}`;
                    squareDiv.dataset.square = squareName;

                    if (piece) {
                        const pDiv = document.createElement('div');
                        pDiv.className = 'piece';
                        pDiv.style.backgroundImage = `url('${chessPieces[piece.color + piece.type]}')`;
                        squareDiv.appendChild(pDiv);
                    }

                    squareDiv.addEventListener('click', () => handleSquareClick(squareName));
                    board.appendChild(squareDiv);
                }
            }
        }

        let selectedSquare = null;

        function handleSquareClick(square) {
            if (selectedSquare) {
                const move = chess.move({from: selectedSquare, to: square, promotion: 'q'});
                if (move) {
                    moveHistory.push(move);
                    updateMoveList();
                    renderChessBoard();
                    if (!chess.isGameOver()) setTimeout(aiMove, 700);
                    else endGame();
                }
                selectedSquare = null;
            } else if (chess.get(square) && chess.get(square).color === 'w') {
                selectedSquare = square;
            }
        }

        function updateMoveList() {
            const container = document.getElementById('move-list');
            container.innerHTML = moveHistory.map((m, i) => `
                <div class="py-2 px-4 ${i%2===0?'bg-white/5':''} rounded-xl text-sm">
                    ${Math.floor(i/2)+1}. ${m.san}
                </div>
            `).join('');
        }

        // Einfache aber bessere KI
        function aiMove() {
            const moves = chess.moves({verbose: true});
            if (!moves.length) return;

            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            chess.move(randomMove);
            moveHistory.push(randomMove);
            updateMoveList();
            renderChessBoard();

            if (chess.isGameOver()) endGame();
        }

        function endGame() {
            const isWin = chess.isCheckmate() && chess.turn() === 'b';
            alert(isWin ? `🎉 Du hast ${currentOpponent.name} besiegt!` : `😔 Du wurdest besiegt.`);
            if (isWin && campaignProgress < opponents.length - 1) {
                campaignProgress++;
                localStorage.setItem('campaign_progress', campaignProgress);
                renderCampaignMap();
            }
            closeGameModal();
        }

        function closeGameModal() {
            document.getElementById('game-modal').classList.add('hidden');
            document.getElementById('game-modal').classList.remove('flex');
        }

        function resignGame() {
            if (confirm("Wirklich aufgeben?")) closeGameModal();
        }

        // ==================== INIT ====================
        window.onload = function() {
            renderCampaignMap();
            console.log("%c✅ ChessQuest Kampagne – einheitliches Design angepasst!", "color:#67e8f9");
        };
    </script>
</body>
</html>
