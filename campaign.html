<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessQuest • Kampagne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { 
            background: rgba(15, 23, 42, 0.92); 
            backdrop-filter: blur(20px); 
        }
        
        /* Chess.com Style Brett */
        .chess-square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .piece {
            width: 54px;
            height: 54px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .map-node {
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .map-node:hover { transform: scale(1.25); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="glass border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">♟️</div>
                <h1 class="logo-font text-3xl tracking-tighter">ChessQuest</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-cyan-400 transition-colors">Home</a>
                <a href="campaign.html" class="text-cyan-400 font-semibold">Kampagne</a>
            </div>
            <div onclick="showCharacterModal()" id="character-preview" class="flex items-center gap-3 cursor-pointer">
                <div id="nav-avatar" class="w-9 h-9 rounded-2xl flex items-center justify-center text-2xl shadow-lg"></div>
                <div>
                    <p id="nav-name" class="font-semibold"></p>
                    <p id="nav-elo" class="text-xs text-white/60"></p>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-6xl font-bold logo-font tracking-tighter mb-2">Die Weltkampagne</h1>
        <p class="text-zinc-400 text-xl">Reise über die echte Weltkarte und besiege die Meister jedes Kontinents</p>

        <!-- ECHTE WELTKARTE -->
        <div class="glass rounded-3xl p-10 mt-10 relative">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-globe"></i> Die Welt von ChessQuest
            </h2>
            
            <svg id="world-map" width="100%" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" class="mx-auto">
                <!-- Vereinfachte aber realistische Weltkarte (Kontinente) -->
                <!-- Europa -->
                <path d="M380 180 Q420 140 480 160 Q510 190 550 170" fill="#334155" stroke="#64748b" stroke-width="12"/>
                <!-- Asien -->
                <path d="M580 140 Q720 80 850 160 Q920 200 980 180" fill="#334155" stroke="#64748b" stroke-width="18"/>
                <!-- Afrika -->
                <path d="M480 280 Q520 380 580 420 Q640 390 670 320" fill="#334155" stroke="#64748b" stroke-width="16"/>
                <!-- Nordamerika -->
                <path d="M150 120 Q220 80 280 140 Q300 200 250 220" fill="#334155" stroke="#64748b" stroke-width="14"/>
                <!-- Südamerika -->
                <path d="M220 300 Q280 420 320 450 Q350 380 300 320" fill="#334155" stroke="#64748b" stroke-width="12"/>
                <!-- Australien -->
                <path d="M950 380 Q1020 400 1050 420 Q1080 390 1040 370" fill="#334155" stroke="#64748b" stroke-width="10"/>
                
                <g id="map-nodes"></g>
            </svg>
        </div>

        <!-- STORY BOX -->
        <div id="story-box" class="glass rounded-3xl p-8 mt-8 hidden">
            <div class="flex flex-col md:flex-row gap-8">
                <div id="opponent-avatar" class="text-8xl w-32 h-32 flex items-center justify-center bg-zinc-800 rounded-2xl flex-shrink-0"></div>
                <div class="flex-1">
                    <h3 id="opponent-name" class="text-4xl font-bold"></h3>
                    <p id="opponent-continent" class="text-cyan-400 text-xl"></p>
                    <p id="opponent-story" class="mt-6 text-zinc-300 leading-relaxed text-lg"></p>
                    
                    <div class="mt-8 flex gap-4">
                        <button onclick="startCampaignGame()" 
                                class="px-10 py-5 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold flex items-center gap-3 text-lg">
                            <i class="fa-solid fa-chess-knight"></i>
                            Jetzt herausfordern
                        </button>
                        <button onclick="closeStory()" 
                                class="px-10 py-5 border border-white/40 hover:bg-white/10 rounded-2xl text-lg">
                            Zurück zur Karte
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CHARACTER MODAL -->
    <div id="character-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
            <h2 class="text-4xl font-bold mb-10">Wähle deinen Helden</h2>
            <div class="grid grid-cols-2 gap-10">
                <div onclick="selectCharacter(0)" class="cursor-pointer group">
                    <div class="text-9xl mx-auto mb-4 transition group-hover:scale-110">🧔</div>
                    <p class="font-semibold text-2xl">Aetherion</p>
                </div>
                <div onclick="selectCharacter(1)" class="cursor-pointer group">
                    <div class="text-9xl mx-auto mb-4 transition group-hover:scale-110">👩</div>
                    <p class="font-semibold text-2xl">Lunara</p>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME MODAL -->
    <div id="game-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[60] p-4">
        <div class="w-full max-w-6xl bg-zinc-900 rounded-3xl overflow-hidden">
            <div class="px-8 py-5 border-b border-white/10 flex justify-between">
                <div class="flex items-center gap-5">
                    <span id="opponent-avatar-game" class="text-5xl"></span>
                    <div>
                        <p id="opponent-name-game" class="font-bold text-xl"></p>
                        <p id="opponent-elo-game" class="text-zinc-400"></p>
                    </div>
                </div>
                <button onclick="closeGameModal()" class="text-4xl text-white/60 hover:text-white">✕</button>
            </div>
            
            <div class="flex flex-col lg:flex-row">
                <div class="flex-1 p-8 flex justify-center bg-zinc-950">
                    <div id="chessboard" class="grid grid-cols-8 w-full max-w-[560px] aspect-square rounded-xl overflow-hidden shadow-2xl"></div>
                </div>
                <div class="lg:w-96 bg-zinc-950 p-6 flex flex-col">
                    <div id="move-list" class="flex-1 overflow-y-auto pr-4 text-sm space-y-1"></div>
                    <button onclick="resignGame()" class="mt-6 py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Aufgeben</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCharacter = null;
        let currentOpponent = null;
        let chess = new Chess();
        let moveHistory = [];
        let campaignProgress = parseInt(localStorage.getItem('campaign_progress')) || 0;

        const chessPieces = {
            'wp': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png',
            'wr': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png',
            'wn': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png',
            'wb': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png',
            'wq': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png',
            'wk': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png',
            'bp': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png',
            'br': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png',
            'bn': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png',
            'bb': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png',
            'bq': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png',
            'bk': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png'
        };

        const opponents = [
            {id:1, name:"Elias der Anfänger", continent:"Europa (Deutschland)", elo:500, emoji:"🇩🇪", story:"Ein junger Schachspieler aus München. Er hat gerade erst angefangen und lernt noch die Grundlagen."},
            {id:2, name:"Anya die Froststrategin", continent:"Russland", elo:850, emoji:"❄️", story:"Eine kalte und präzise Spielerin aus Sibirien. Ihre Verteidigung ist fast unüberwindbar."},
            {id:3, name:"Khalid der Wüstenfuchs", continent:"Afrika (Marokko)", elo:1200, emoji:"🦊", story:"Ein nomadischer Meister aus der Sahara. Er liebt taktische Fallen und Überraschungen."},
            {id:4, name:"Mei Lin die Seidenmeisterin", continent:"Asien (China)", elo:1550, emoji:"🐉", story:"Ehemalige Nationalspielerin aus Shanghai. Ihre Eröffnungen sind elegant und tödlich."},
            {id:5, name:"Rajesh der Tempelwächter", continent:"Indien", elo:1800, emoji:"🛕", story:"Ein weiser Schachphilosoph aus Varanasi. Er sieht das Brett wie ein göttliches Spiel."},
            {id:6, name:"Void Sovereign", continent:"Die Letzte Prüfung", elo:2000, emoji:"🌌", story:"Der mysteriöse Endgegner. Nur wer alle Kontinente gemeistert hat, darf ihm gegenübertreten."}
        ];

        function showCharacterModal() {
            document.getElementById('character-modal').classList.remove('hidden');
        }

        function selectCharacter(gender) {
            currentCharacter = gender === 0 ? 
                {name: "Aetherion", avatar: "🧔"} : 
                {name: "Lunara", avatar: "👩"};
            
            document.getElementById('nav-avatar').innerHTML = currentCharacter.avatar;
            document.getElementById('nav-name').textContent = currentCharacter.name;
            document.getElementById('nav-elo').textContent = "ELO 1423";
            
            document.getElementById('character-modal').classList.add('hidden');
            renderCampaignMap();
        }

        function renderCampaignMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = '';

            opponents.forEach((opp, i) => {
                const unlocked = i <= campaignProgress;
                const x = 120 + i * 170;
                const y = (i % 2 === 0) ? 180 : 340;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.classList.add('map-node');

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", "42");
                circle.setAttribute("fill", unlocked ? "#22d3ee" : "#1e2937");
                circle.setAttribute("stroke", "#fff");
                circle.setAttribute("stroke-width", unlocked ? "6" : "3");

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", y + 12);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("font-size", "32");
                text.textContent = opp.emoji;

                g.appendChild(circle);
                g.appendChild(text);

                if (unlocked) {
                    g.addEventListener('click', () => showOpponentStory(opp));
                }

                container.appendChild(g);
            });
        }

        function showOpponentStory(opp) {
            currentOpponent = opp;
            document.getElementById('opponent-avatar').innerHTML = opp.emoji;
            document.getElementById('opponent-name').textContent = opp.name;
            document.getElementById('opponent-continent').textContent = opp.continent;
            document.getElementById('opponent-story').textContent = opp.story;
            document.getElementById('story-box').classList.remove('hidden');
        }

        function closeStory() {
            document.getElementById('story-box').classList.add('hidden');
        }

        function startCampaignGame() {
            closeStory();
            chess = new Chess();
            moveHistory = [];

            const modal = document.getElementById('game-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('opponent-avatar-game').innerHTML = currentOpponent.emoji;
            document.getElementById('opponent-name-game').textContent = currentOpponent.name;
            document.getElementById('opponent-elo-game').textContent = `ELO ${currentOpponent.elo}`;

            renderChessBoard();
        }

        function renderChessBoard() {
            const board = document.getElementById('chessboard');
            board.innerHTML = '';

            for (let rank = 8; rank >= 1; rank--) {
                for (let file = 0; file < 8; file++) {
                    const squareName = String.fromCharCode(97 + file) + rank;
                    const piece = chess.get(squareName);
                    const isLight = (rank + file) % 2 === 1;

                    const squareDiv = document.createElement('div');
                    squareDiv.className = `chess-square ${isLight ? 'light' : 'dark'}`;
                    squareDiv.dataset.square = squareName;

                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.style.backgroundImage = `url('${chessPieces[piece.color + piece.type]}')`;
                        squareDiv.appendChild(pieceDiv);
                    }

                    squareDiv.addEventListener('click', () => handleSquareClick(squareName));
                    board.appendChild(squareDiv);
                }
            }
        }

        let selectedSquare = null;

        function handleSquareClick(square) {
            if (selectedSquare) {
                const move = chess.move({from: selectedSquare, to: square, promotion: 'q'});
                if (move) {
                    moveHistory.push(move);
                    updateMoveList();
                    renderChessBoard();

                    if (!chess.isGameOver()) {
                        setTimeout(aiMove, 700);
                    } else {
                        endGame();
                    }
                }
                selectedSquare = null;
            } else if (chess.get(square) && chess.get(square).color === 'w') {
                selectedSquare = square;
            }
        }

        function updateMoveList() {
            const container = document.getElementById('move-list');
            container.innerHTML = moveHistory.map((m, i) => `
                <div class="py-2 px-4 ${i % 2 === 0 ? 'bg-white/5' : ''} rounded-xl">
                    ${Math.floor(i/2)+1}. ${m.san}
                </div>
            `).join('');
        }

        // Verbesserte KI (Material + zufällige gute Züge)
        function evaluateBoard() {
            const values = {p:100, n:320, b:330, r:500, q:900, k:20000};
            let score = 0;
            const board = chess.board();
            for (let row of board) {
                for (let p of row) {
                    if (p) score += (p.color === 'w' ? values[p.type] : -values[p.type]);
                }
            }
            return score;
        }

        function aiMove() {
            const possibleMoves = chess.moves({verbose: true});
            if (possibleMoves.length === 0) return;

            let bestMoves = [];
            let bestScore = chess.turn() === 'b' ? Infinity : -Infinity;

            possibleMoves.forEach(move => {
                chess.move(move);
                const score = evaluateBoard();
                chess.undo();

                if ((chess.turn() === 'b' && score < bestScore) || (chess.turn() === 'w' && score > bestScore)) {
                    bestScore = score;
                    bestMoves = [move];
                } else if (score === bestScore) {
                    bestMoves.push(move);
                }
            });

            const chosenMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            chess.move(chosenMove);
            moveHistory.push(chosenMove);
            updateMoveList();
            renderChessBoard();

            if (chess.isGameOver()) endGame();
        }

        function endGame() {
            const isWin = chess.isCheckmate() && chess.turn() === 'b';
            
            if (isWin) {
                alert(`🎉 Glückwunsch! Du hast ${currentOpponent.name} besiegt!`);
                if (campaignProgress < opponents.length - 1) {
                    campaignProgress++;
                    localStorage.setItem('campaign_progress', campaignProgress);
                    renderCampaignMap();
                }
            } else {
                alert(`😔 ${currentOpponent.name} hat dich besiegt. Versuche es erneut!`);
            }
            closeGameModal();
        }

        function closeGameModal() {
            document.getElementById('game-modal').classList.add('hidden');
            document.getElementById('game-modal').classList.remove('flex');
        }

        function resignGame() {
            if (confirm("Möchtest du wirklich aufgeben?")) closeGameModal();
        }

        // INIT
        window.onload = () => {
            if (!currentCharacter) showCharacterModal();
            renderCampaignMap();
            console.log('%c✅ ChessQuest Kampagne – Echte Weltkarte + volle KI geladen!', 'color:#67e8f9; font-weight:bold');
        };
    </script>
</body>
</html>
