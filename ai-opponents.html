<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessQuest • KI-Gegner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
        }
        
        .chess-square {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .piece {
            width: 58px;
            height: 58px;
            background-size: contain;
            background-repeat: no-repeat;
        }
        
        .tab-button.active {
            border-bottom: 4px solid #22d3ee;
            color: #22d3ee;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- EINHEITLICHE NAVBAR -->
    <nav class="bg-black/80 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-3xl">♟️</div>
                <span class="text-3xl font-bold logo-font tracking-tighter">ChessQuest</span>
            </div>

            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-house"></i> Home</a>
                <a href="campaign.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-map"></i> Kampagne</a>
                <a href="ai-opponents.html" class="text-cyan-400 font-semibold flex items-center gap-2"><i class="fa-solid fa-robot"></i> KI-Gegner</a>
                <a href="analysis-board.html" class="hover:text-cyan-400 flex items-center gap-2"><i class="fa-solid fa-chart-simple"></i> Analysebrett</a>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleLanguage()" class="px-4 py-2 text-sm border border-white/30 rounded-2xl" id="lang-btn">🇩🇪 Deutsch</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-5xl font-bold logo-font tracking-tighter mb-3">KI-Gegner</h1>
        <p class="text-zinc-400 text-xl">Wähle deinen Gegner und verbessere dein Spiel</p>

        <!-- TABS -->
        <div class="flex border-b border-white/10 mt-12 mb-8 overflow-x-auto">
            <button onclick="switchTab(0)" id="tab-0" class="tab-button active px-8 py-4 font-medium whitespace-nowrap">Story-Gegner</button>
            <button onclick="switchTab(1)" id="tab-1" class="tab-button px-8 py-4 font-medium whitespace-nowrap">ELO-Leiter</button>
            <button onclick="switchTab(2)" id="tab-2" class="tab-button px-8 py-4 font-medium whitespace-nowrap">Eigener Gegner</button>
        </div>

        <div id="tab-content" class="min-h-[500px]"></div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black py-12 border-t border-white/10 mt-20">
        <div class="max-w-7xl mx-auto px-6 text-center text-zinc-500 text-sm">
            © 2026 ChessQuest • Professionelle Schachplattform
        </div>
    </footer>

    <!-- GAME MODAL -->
    <div id="game-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[60] p-4">
        <div class="w-full max-w-6xl bg-zinc-900 rounded-3xl overflow-hidden">
            <div class="px-8 py-5 border-b border-white/10 flex justify-between items-center">
                <div class="flex items-center gap-5">
                    <span id="opponent-avatar-game" class="text-5xl"></span>
                    <div>
                        <p id="opponent-name-game" class="font-bold text-xl"></p>
                        <p id="opponent-elo-game" class="text-zinc-400"></p>
                    </div>
                </div>
                <button onclick="closeGameModal()" class="text-4xl text-white/60 hover:text-white">✕</button>
            </div>
            
            <div class="flex flex-col lg:flex-row">
                <div class="flex-1 p-8 flex justify-center bg-zinc-950">
                    <div id="chessboard" class="grid grid-cols-8 w-full max-w-[560px] aspect-square rounded-xl overflow-hidden shadow-2xl"></div>
                </div>
                <div class="lg:w-96 bg-zinc-950 p-6 flex flex-col">
                    <div id="move-list" class="flex-1 overflow-y-auto text-sm space-y-1"></div>
                    <button onclick="resignGame()" class="mt-6 py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Aufgeben</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCharacter = null;
        let currentOpponent = null;
        let chess = new Chess();
        let moveHistory = [];
        let selectedSquare = null;

        const chessPieces = {
            wp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
            wr: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
            wn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
            wb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
            wq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
            wk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
            bp: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
            br: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
            bn: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
            bb: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
            bq: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
            bk: "https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
        };

        const storyOpponents = [
            {name: "Elias der Anfänger", elo: 500, emoji: "🇩🇪", story: "Junger Schachspieler aus München – lernt noch die Grundlagen."},
            {name: "Anya die Froststrategin", elo: 850, emoji: "❄️", story: "Kalte Präzision aus Sibirien."},
            {name: "Khalid der Wüstenfuchs", elo: 1200, emoji: "🦊", story: "Taktischer Meister aus der Sahara."},
            {name: "Mei Lin die Seidenmeisterin", elo: 1550, emoji: "🐉", story: "Elegante und tödliche Eröffnungen aus Shanghai."},
            {name: "Rajesh der Tempelwächter", elo: 1800, emoji: "🛕", story: "Weiser Philosoph aus Varanasi."},
            {name: "Void Sovereign", elo: 2000, emoji: "🌌", story: "Der mysteriöse Endgegner."}
        ];

        function switchTab(tab) {
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            const content = document.getElementById('tab-content');
            content.innerHTML = '';

            if (tab === 0) { // Story-Gegner
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${storyOpponents.map(opp => `
                            <div onclick='startGameAgainst(${JSON.stringify(opp)})' 
                                 class="glass rounded-3xl p-6 cursor-pointer hover:scale-105 transition-all">
                                <div class="flex justify-between items-start">
                                    <div class="text-6xl">${opp.emoji}</div>
                                    <div class="bg-white/10 px-4 py-1 rounded-2xl text-sm font-mono">${opp.elo} ELO</div>
                                </div>
                                <h3 class="font-semibold text-xl mt-6">${opp.name}</h3>
                                <p class="text-zinc-400 mt-2 text-sm">${opp.story}</p>
                            </div>
                        `).join('')}
                    </div>`;
            } 
            else if (tab === 1) { // ELO-Leiter
                const levels = [400, 800, 1200, 1600, 2000, 2400];
                content.innerHTML = `
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        ${levels.map(elo => `
                            <div onclick='startGameAgainst({name: "KI Level ${elo}", elo: ${elo}, emoji: "♟️", story: "Starke Engine auf ${elo} ELO"})' 
                                 class="glass rounded-3xl p-8 text-center cursor-pointer hover:scale-105 transition-all">
                                <div class="text-5xl mb-4">♟️</div>
                                <h3 class="text-4xl font-bold">${elo}</h3>
                                <p class="text-zinc-400">ELO</p>
                            </div>
                        `).join('')}
                    </div>`;
            } 
            else if (tab === 2) { // Eigener Gegner
                content.innerHTML = `
                    <div class="glass rounded-3xl p-12 max-w-xl mx-auto text-center">
                        <h3 class="text-3xl font-semibold mb-10">Eigenen Gegner erstellen</h3>
                        <div class="space-y-8">
                            <div>
                                <label class="block text-white/70 mb-2">Name des Gegners</label>
                                <input id="custom-name" type="text" placeholder="z.B. Shadow Master" 
                                       class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 text-lg">
                            </div>
                            <div>
                                <label class="block text-white/70 mb-2">ELO-Stärke</label>
                                <input id="custom-elo" type="range" min="200" max="2800" value="1600" step="100"
                                       class="w-full accent-cyan-400" oninput="document.getElementById('elo-val').textContent = this.value">
                                <div class="flex justify-between text-sm mt-2">
                                    <span>200</span>
                                    <span id="elo-val" class="font-mono text-3xl font-bold">1600</span>
                                    <span>2800</span>
                                </div>
                            </div>
                            <button onclick="createCustomOpponent()" 
                                    class="w-full py-6 bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-semibold rounded-3xl text-xl hover:scale-105 transition">
                                Gegner erstellen & spielen
                            </button>
                        </div>
                    </div>`;
            }
        }

        function createCustomOpponent() {
            const name = document.getElementById('custom-name').value.trim() || "Custom KI";
            const elo = parseInt(document.getElementById('custom-elo').value);
            startGameAgainst({name, elo, emoji: "♟️", story: "Dein persönlich erstellter Gegner"});
        }

        function startGameAgainst(opp) {
            currentOpponent = opp;
            chess = new Chess();
            moveHistory = [];
            selectedSquare = null;

            const modal = document.getElementById('game-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('opponent-avatar-game').innerHTML = opp.emoji;
            document.getElementById('opponent-name-game').textContent = opp.name;
            document.getElementById('opponent-elo-game').textContent = `ELO ${opp.elo}`;

            renderChessBoard();
        }

        function renderChessBoard() {
            const boardEl = document.getElementById('chessboard');
            boardEl.innerHTML = '';

            for (let rank = 8; rank >= 1; rank--) {
                for (let file = 0; file < 8; file++) {
                    const squareName = String.fromCharCode(97 + file) + rank;
                    const piece = chess.get(squareName);
                    const isLight = (rank + file) % 2 === 1;

                    const squareDiv = document.createElement('div');
                    squareDiv.className = `chess-square ${isLight ? 'light' : 'dark'}`;
                    squareDiv.dataset.square = squareName;

                    if (piece) {
                        const pDiv = document.createElement('div');
                        pDiv.className = 'piece';
                        pDiv.style.backgroundImage = `url('${chessPieces[piece.color + piece.type]}')`;
                        squareDiv.appendChild(pDiv);
                    }

                    squareDiv.addEventListener('click', () => handleClick(squareName));
                    boardEl.appendChild(squareDiv);
                }
            }
        }

        function handleClick(square) {
            if (selectedSquare) {
                const move = chess.move({from: selectedSquare, to: square, promotion: 'q'});
                if (move) {
                    moveHistory.push(move);
                    updateMoveList();
                    renderChessBoard();

                    if (!chess.isGameOver()) {
                        setTimeout(aiMove, 650);
                    } else {
                        endGame();
                    }
                }
                selectedSquare = null;
            } else if (chess.get(square) && chess.get(square).color === 'w') {
                selectedSquare = square;
            }
        }

        function updateMoveList() {
            const list = document.getElementById('move-list');
            list.innerHTML = moveHistory.map((m, i) => `
                <div class="py-2 px-4 ${i%2===0 ? 'bg-white/5' : ''} rounded-xl text-sm">
                    ${Math.floor(i/2)+1}. ${m.san}
                </div>
            `).join('');
        }

        // Verbesserte KI (Material-Bewertung)
        function aiMove() {
            const moves = chess.moves({verbose: true});
            if (!moves.length) return;

            let bestScore = chess.turn() === 'b' ? Infinity : -Infinity;
            let bestMoves = [];

            moves.forEach(move => {
                chess.move(move);
                const score = evaluateBoard();
                chess.undo();

                if ((chess.turn() === 'b' && score < bestScore) || (chess.turn() === 'w' && score > bestScore)) {
                    bestScore = score;
                    bestMoves = [move];
                } else if (score === bestScore) {
                    bestMoves.push(move);
                }
            });

            const chosen = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            chess.move(chosen);
            moveHistory.push(chosen);
            updateMoveList();
            renderChessBoard();

            if (chess.isGameOver()) endGame();
        }

        function evaluateBoard() {
            const values = {p:100, n:320, b:330, r:500, q:900, k:20000};
            let score = 0;
            const board = chess.board();
            for (let row of board) {
                for (let p of row) {
                    if (p) score += (p.color === 'w' ? values[p.type] : -values[p.type]);
                }
            }
            return score;
        }

        function endGame() {
            const isWin = chess.isCheckmate() && chess.turn() === 'b';
            alert(isWin ? `🎉 Du hast ${currentOpponent.name} besiegt!` : `😔 ${currentOpponent.name} hat gewonnen.`);
            closeGameModal();
        }

        function closeGameModal() {
            const modal = document.getElementById('game-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function resignGame() {
            if (confirm("Wirklich aufgeben?")) closeGameModal();
        }

        function toggleLanguage() {
            alert("Sprachumschaltung wird bald global verfügbar sein.");
        }

        // INIT
        window.onload = function() {
            switchTab(0);
            console.log("%c✅ ChessQuest KI-Gegner – einheitliches Design fertig!", "color:#67e8f9; font-weight:bold");
        };
    </script>
</body>
</html>
